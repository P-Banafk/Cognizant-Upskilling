<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Grid 3.2</title>

    <!-- Bootstrap CSS (CDN for simplicity) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <!-- 🔥 CONTAINER -->
    <div class="container mt-5">

        <h2 class="mb-4 text-primary">Bootstrap Grid Layout (3.2)</h2>

        <!-- 🔥 ROW -->
        <div class="row">

            <!-- Column 1 -->
            <div class="col-12 col-md-4 bg-primary text-white p-3">
                Column 1
            </div>

            <!-- Column 2 -->
            <div class="col-12 col-md-4 bg-success text-white p-3">
                Column 2
            </div>

            <!-- Column 3 -->
            <div class="col-12 col-md-4 bg-danger text-white p-3">
                Column 3
            </div>

        </div>

    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
