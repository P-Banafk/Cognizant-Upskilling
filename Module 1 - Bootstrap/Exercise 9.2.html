<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button Groups</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h3>Button Group</h3>

    <div class="btn-group mb-4">
        <button class="btn btn-primary">Left</button>
        <button class="btn btn-primary">Middle</button>
        <button class="btn btn-primary">Right</button>
    </div>

    <h3>Toggle Buttons</h3>

    <input type="checkbox" class="btn-check" id="option1">
    <label class="btn btn-outline-success" for="option1">
        Option 1
    </label>

    <input type="checkbox" class="btn-check" id="option2">
    <label class="btn btn-outline-success" for="option2">
        Option 2
    </label>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
